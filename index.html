<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MyPurpleSpotify Deluxe Glow</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Montserrat', sans-serif;
color:white;
overflow-x:hidden;
}

/* VIDEO BACKGROUND */

#bgVideo{
position:fixed;
right:0;
bottom:0;
min-width:100%;
min-height:100%;
z-index:-2;
object-fit:cover;
}

#videoOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(10,0,20,0.7);
z-index:-1;
}

/* HEADER */

header{
padding:20px;
text-align:center;
background:rgba(138,43,226,0.5);
font-size:28px;
font-weight:700;
backdrop-filter:blur(10px);
}

/* SEARCH */

#searchContainer{
display:flex;
justify-content:center;
gap:10px;
margin:20px;
}

#searchContainer input{
width:300px;
padding:10px;
border-radius:10px;
border:none;
}

#searchContainer button{
padding:10px 20px;
border:none;
border-radius:10px;
background:#ba55d3;
color:white;
cursor:pointer;
}

/* TRACK GRID */

.track-list{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
padding:20px;
}

.track{
background:rgba(120,0,200,0.3);
backdrop-filter:blur(20px);
padding:20px;
border-radius:20px;
transition:0.3s;
}

.track:hover{
transform:scale(1.05);
box-shadow:0 0 30px rgba(200,100,255,0.6);
}

iframe{
width:100%;
border-radius:12px;
}

/* VISUALIZER */

#visualizer{
position:fixed;
bottom:0;
left:0;
width:100%;
height:120px;
display:flex;
justify-content:center;
align-items:flex-end;
gap:4px;
pointer-events:none;
}

.bar{
width:6px;
background:#d580ff;
height:20px;
animation:music 1s infinite ease-in-out;
}

@keyframes music{
0%{height:10px}
50%{height:100px}
100%{height:10px}
}

</style>
</head>

<body>

<!-- VIDEO BACKGROUND -->
<video autoplay muted loop id="bgVideo">
<source src="YOUR_VIDEO.mp4" type="video/mp4">
</video>

<div id="videoOverlay"></div>

<header>💜 MyPurpleSpotify Deluxe Glow</header>

<div id="searchContainer">
<input type="text" id="trackUrl" placeholder="Вставь ссылку SoundCloud">
<button id="addTrack">Добавить</button>
</div>

<div class="track-list" id="track-list"></div>

<!-- VISUALIZER -->
<div id="visualizer"></div>

<script src="https://w.soundcloud.com/player/api.js"></script>

<script>

const vis = document.getElementById("visualizer")

for(let i=0;i<60;i++){
const bar=document.createElement("div")
bar.className="bar"
bar.style.animationDelay=Math.random()+"s"
vis.appendChild(bar)
}

/* TRACK ADD */

document.getElementById('addTrack').addEventListener('click',()=>{

const url=document.getElementById('trackUrl').value
if(!url)return

const container=document.getElementById('track-list')

const div=document.createElement('div')
div.className="track"

div.innerHTML=`

<h3>Трек</h3>

<iframe height="166"></iframe>

`

container.prepend(div)

const iframe=div.querySelector('iframe')

iframe.src=`https://w.soundcloud.com/player/?url=${encodeURIComponent(url)}&color=%23ba55d3`

document.getElementById('trackUrl').value=''

})

</script>

</body>
</html>
