<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini 2D Minecraft</title>
<style>
body { margin:0; overflow:hidden; background:#87CEEB; font-family:Arial;}
canvas { display:block; margin:auto; background:#87CEEB;}
#inventory { position:absolute; bottom:10px; left:50%; transform:translateX(-50%);
background:rgba(0,0,0,0.5); padding:5px; display:flex; gap:5px;}
.slot { width:40px; height:40px; border:2px solid white; display:flex; justify-content:center; align-items:center; color:white; font-weight:bold; cursor:pointer;}
.slot.selected { border-color:yellow; }
</style>
</head>
<body>

<canvas id="game" width="900" height="500"></canvas>
<div id="inventory"></div>

<script>
const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

const BLOCK_SIZE = 40
const ROWS = canvas.height / BLOCK_SIZE
const COLS = canvas.width / BLOCK_SIZE

// Блоки: 0-пусто, 1-земля,2-трава,3-камень,4-дерево
let world = []

// Генерация мира
function generateWorld(){
    for(let y=0;y<ROWS;y++){
        world[y]=[]
        for(let x=0;x<COLS;x++){
            if(y>ROWS-2) world[y][x]=1
            else if(y==ROWS-2) world[y][x]=2
            else if(Math.random()<0.05 && y==ROWS-3) world[y][x]=3
            else world[y][x]=0
        }
    }
    // деревья
    for(let i=0;i<5;i++){
        let tx = Math.floor(Math.random()*COLS)
        let ty = ROWS-3
        world[ty][tx]=4
        world[ty-1][tx]=4
    }
}

// Загрузка мира из localStorage
if(localStorage.getItem("miniWorld")){
    world = JSON.parse(localStorage.getItem("miniWorld"))
}else{
    generateWorld()
}

let player = {
    x:5*BLOCK_SIZE,
    y: (ROWS-3)*BLOCK_SIZE,
    w:BLOCK_SIZE*0.8,
    h:BLOCK_SIZE*0.9,
    dx:0,
    dy:0,
    speed:4,
    jump:12,
    ground:false
}

let gravity = 0.6
let keys = {}

document.addEventListener("keydown", e=>keys[e.key]=true)
document.addEventListener("keyup", e=>keys[e.key]=false)

// Инвентарь
let blocksList = [1,2,3,4]
let selectedBlock = 1
const invDiv = document.getElementById("inventory")
function drawInventory(){
    invDiv.innerHTML=""
    blocksList.forEach(b=>{
        let slot = document.createElement("div")
        slot.className="slot"
        if(b==selectedBlock) slot.classList.add("selected")
        slot.textContent=b
        slot.onclick=()=>selectedBlock=b
        invDiv.appendChild(slot)
    })
}
drawInventory()

canvas.addEventListener("click",e=>{
    let mx = Math.floor(e.offsetX/BLOCK_SIZE)
    let my = Math.floor(e.offsetY/BLOCK_SIZE)
    if(keys["Shift"]){
        world[my][mx]=0 // ломаем
    }else{
        if(world[my][mx]==0) world[my][mx]=selectedBlock // ставим
    }
    localStorage.setItem("miniWorld",JSON.stringify(world))
})

function update(){
    if(keys["a"]||keys["ArrowLeft"]) player.dx=-player.speed
    else if(keys["d"]||keys["ArrowRight"]) player.dx=player.speed
    else player.dx=0

    if((keys["w"]||keys[" "]) && player.ground){
        player.dy=-player.jump
        player.ground=false
    }

    player.dy+=gravity
    player.x+=player.dx
    player.y+=player.dy

    player.ground=false
    let px=Math.floor((player.x)/BLOCK_SIZE)
    let py=Math.floor((player.y+player.h)/BLOCK_SIZE)
    if(py>=ROWS) { player.y=(ROWS-1)*BLOCK_SIZE-player.h; player.dy=0; player.ground=true }

    // Столкновения
    for(let y=0;y<ROWS;y++){
        for(let x=0;x<COLS;x++){
            if(world[y][x]!=0){
                let bx = x*BLOCK_SIZE, by=y*BLOCK_SIZE
                if(player.x<bx+BLOCK_SIZE && player.x+player.w>bx &&
                   player.y<by+BLOCK_SIZE && player.y+player.h>by){
                    // Снизу
                    if(player.dy>0) { player.y=by-player.h; player.dy=0; player.ground=true }
                    // Сверху
                    if(player.dy<0) { player.y=by+BLOCK_SIZE; player.dy=0 }
                    // Сбоку
                    if(player.dx>0) player.x=bx-player.w
                    if(player.dx<0) player.x=bx+BLOCK_SIZE
                }
            }
        }
    }
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height)
    // Блоки
    for(let y=0;y<ROWS;y++){
        for(let x=0;x<COLS;x++){
            let b = world[y][x]
            if(b!=0){
                switch(b){
                    case 1: ctx.fillStyle="#654321"; break; // земля
                    case 2: ctx.fillStyle="#00FF00"; break; // трава
                    case 3: ctx.fillStyle="#888888"; break; // камень
                    case 4: ctx.fillStyle="#228B22"; break; // дерево
                }
                ctx.fillRect(x*BLOCK_SIZE,y*BLOCK_SIZE,BLOCK_SIZE,BLOCK_SIZE)
            }
        }
    }
    // Игрок
    ctx.fillStyle="#FF0000"
    ctx.fillRect(player.x,player.y,player.w,player.h)
}

function loop(){
    update()
    draw()
    requestAnimationFrame(loop)
}

loop()
</script>
</body>
</html>
