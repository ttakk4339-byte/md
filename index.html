<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Tracks</title>
<style>
body{ background:#111; color:white; font-family:Arial; text-align:center; }
h1{ color:#ff5500; }
.track{ background:#222; margin:20px auto; padding:15px; width:400px; border-radius:10px; }
audio{ width:100%; }
</style>
</head>
<body>

<h1>🎵 My Tracks</h1>

<div id="tracks"></div>

<script>
const trackList=[
  {title:"Track 1", url:"https://example.com/song1.mp3"},
  {title:"Track 2", url:"https://example.com/song2.mp3"},
  // добавляй сюда свои mp3 ссылки
];

const container=document.getElementById("tracks");

trackList.forEach(track=>{
  const div=document.createElement("div");
  div.className="track";
  div.innerHTML=`<h3>${track.title}</h3><audio controls src="${track.url}"></audio>`;
  container.appendChild(div);
});
</script>

</body>
</html>
