<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Purple Music Deluxe</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
<style>
body{
    margin:0;
    font-family:'Montserrat', sans-serif;
    background:linear-gradient(135deg,#2a004f,#0c001f);
    color:white;
    overflow-x:hidden;
}

/* Header */
header{
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:700;
    background:rgba(138,43,226,0.6);
    backdrop-filter:blur(10px);
}

/* Track list */
.track-list{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

/* Track card */
.track{
    background:rgba(255,255,255,0.05);
    border-radius:15px;
    padding:15px;
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.1);
    transition:0.3s;
}
.track:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px #a855f7;
}
.track img{
    width:100%;
    border-radius:10px;
}
.track h3{
    margin:10px 0;
}
audio{
    width:100%;
    margin-top:10px;
}
.download{
    display:inline-block;
    margin-top:10px;
    padding:6px 12px;
    background:#a855f7;
    border-radius:6px;
    text-decoration:none;
    color:white;
    font-weight:700;
    transition:0.3s;
}
.download:hover{
    background:#c084fc;
}

/* Snow animation */
.snowflake{
    position:fixed;
    top:-10px;
    z-index:0;
    user-select:none;
    pointer-events:none;
    color:white;
    font-size:1em;
    opacity:0.8;
    animation-name:fall;
    animation-timing-function:linear;
    animation-iteration-count:infinite;
}
@keyframes fall{
    0%{transform:translateY(0);}
    100%{transform:translateY(100vh);}
}
</style>
</head>
<body>

<header>💜 Purple Music Deluxe</header>

<div class="track-list">

<div class="track">
<img src="covers/cover1.jpg">
<h3>Track One</h3>
<audio controls>
<source src="music/track1.mp3" type="audio/mpeg">
</audio>
<a href="music/track1.mp3" download class="download">⬇ Скачать</a>
</div>

<div class="track">
<img src="covers/cover2.jpg">
<h3>Track Two</h3>
<audio controls>
<source src="music/track2.mp3" type="audio/mpeg">
</audio>
<a href="music/track2.mp3" download class="download">⬇ Скачать</a>
</div>

</div>

<script>
// Snow effect
function createSnow(){
    const snowCount = 50;
    for(let i=0;i<snowCount;i++){
        const snow = document.createElement('div');
        snow.className='snowflake';
        snow.style.left=Math.random()*window.innerWidth+'px';
        snow.style.fontSize=(10+Math.random()*20)+'px';
        snow.style.animationDuration=(5+Math.random()*10)+'s';
        snow.style.opacity=Math.random();
        snow.innerHTML='❄';
        document.body.appendChild(snow);
    }
}
createSnow();
</script>

</body>
</html>
