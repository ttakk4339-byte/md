<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MySpotify SoundCloud</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
<style>
body{
    margin:0;
    font-family:'Montserrat', sans-serif;
    background:#121212;
    color:white;
}
header{
    padding:20px;
    text-align:center;
    background:#1DB954;
    font-size:28px;
    font-weight:700;
    letter-spacing:2px;
}
.track-list{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
    padding:20px;
}
.track{
    background:#181818;
    border-radius:15px;
    padding:15px;
    transition: transform 0.2s;
}
.track:hover{
    transform: scale(1.03);
}
.track h3{
    margin:10px 0;
}
iframe{
    border-radius:10px;
}
</style>
</head>
<body>

<header>🎧 MySpotify SoundCloud</header>

<div class="track-list" id="track-list"></div>

<script>
// Сюда вставляешь свои SoundCloud ссылки
const tracks = [
  {
    title: "E-Bannaya",
    url: "https://soundcloud.com/morgenshternfamilyoneluv/morgenshtern-e-bannaya"
  },
  {
    title: "Track Two Example",
    url: "https://soundcloud.com/anotherartist/song2"
  },
  {
    title: "Track Three Example",
    url: "https://soundcloud.com/anotherartist/song3"
  }
];

const container = document.getElementById("track-list");

tracks.forEach(track => {
  const div = document.createElement("div");
  div.className = "track";
  div.innerHTML = `
    <h3>${track.title}</h3>
    <iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay"
      src="https://w.soundcloud.com/player/?url=${encodeURIComponent(track.url)}&color=%231DB954&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false">
    </iframe>
  `;
  container.appendChild(div);
});
</script>

</body>
</html>
