<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini 3D Minecraft</title>
<style>
body { margin:0; overflow:hidden; }
canvas { display:block; }
#instructions {
position:absolute; top:10px; left:10px; color:white; font-family:Arial;
background:rgba(0,0,0,0.5); padding:10px;
}
</style>
</head>
<body>
<div id="instructions">
WASD - двигаться<br>
Мышь - смотреть<br>
ЛКМ - ломать блок<br>
ПКМ - ставить блок
</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.156.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.156.0/examples/js/controls/PointerLockControls.js"></script>
<script>
const scene = new THREE.Scene()
scene.background = new THREE.Color(0x87CEEB)

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000)
const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth, window.innerHeight)
document.body.appendChild(renderer.domElement)

const controls = new THREE.PointerLockControls(camera, document.body)
document.body.addEventListener('click',()=>controls.lock())

const light = new THREE.DirectionalLight(0xffffff,1)
light.position.set(10,20,10)
scene.add(light)

// блоки
const blockSize = 1
let world = []

function createBlock(x,y,z,type){
    let color = 0x654321
    if(type==1) color=0x00FF00
    if(type==2) color=0x888888
    const geometry = new THREE.BoxGeometry(blockSize,blockSize,blockSize)
    const material = new THREE.MeshLambertMaterial({color:color})
    const cube = new THREE.Mesh(geometry,material)
    cube.position.set(x+0.5, y+0.5, z+0.5)
    cube.userData.type = type
    scene.add(cube)
    world.push(cube)
}

// генерация простого мира
for(let x=-10;x<10;x++){
    for(let z=-10;z<10;z++){
        createBlock(x,0,z,0) // земля
        createBlock(x,1,z,1) // трава сверху
        if(Math.random()<0.1) createBlock(x,2,z,2) // камень случайно
    }
}

// управление
const velocity = new THREE.Vector3()
const direction = new THREE.Vector3()
const move = {forward:false,back:false,left:false,right:false}
document.addEventListener('keydown',(e)=>{
    if(e.key=='w') move.forward=true
    if(e.key=='s') move.back=true
    if(e.key=='a') move.left=true
    if(e.key=='d') move.right=true
})
document.addEventListener('keyup',(e)=>{
    if(e.key=='w') move.forward=false
    if(e.key=='s') move.back=false
    if(e.key=='a') move.left=false
    if(e.key=='d') move.right=false
})

// ломаем и ставим блоки
document.addEventListener('mousedown',e=>{
    const raycaster = new THREE.Raycaster()
    raycaster.setFromCamera(new THREE.Vector2(0,0), camera)
    const intersects = raycaster.intersectObjects(world)
    if(intersects.length>0){
        const obj = intersects[0].object
        if(e.button==0){ // ЛКМ ломаем
            scene.remove(obj)
            world = world.filter(o=>o!==obj)
        }else if(e.button==2){ // ПКМ ставим
            const p = intersects[0].point
            const nx = Math.floor(p.x), ny=Math.floor(p.y+0.5), nz=Math.floor(p.z)
            createBlock(nx,ny,nz,1) // ставим траву
        }
    }
})

camera.position.y=2
const clock = new THREE.Clock()

function animate(){
    requestAnimationFrame(animate)
    const delta = clock.getDelta()
    velocity.x-=velocity.x*10.0*delta
    velocity.z-=velocity.z*10.0*delta
    direction.z = Number(move.forward)-Number(move.back)
    direction.x = Number(move.right)-Number(move.left)
    direction.normalize()
    if(move.forward||move.back) velocity.z-=direction.z*10.0*delta
    if(move.left||move.right) velocity.x-=direction.x*10.0*delta
    controls.moveRight(-velocity.x*delta)
    controls.moveForward(-velocity.z*delta)
    renderer.render(scene,camera)
}

animate()
</script>
</body>
</html>
