<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Music</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
}

/* VIDEO BACKGROUND */

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:-1;
}

header{
text-align:center;
padding:20px;
font-size:24px;
}

.controls{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:20px;
}

input{
padding:8px;
width:250px;
border:none;
border-radius:6px;
}

button{
padding:8px 16px;
border:none;
border-radius:6px;
cursor:pointer;
}

.track-list{
max-width:700px;
margin:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:20px;
}

.track{
background:rgba(255,255,255,0.1);
padding:15px;
border-radius:10px;
}

iframe{
width:100%;
border:none;
}

.volume{
width:100%;
margin-top:8px;
}

</style>
</head>

<body>

<video id="bgVideo" autoplay muted loop playsinline>
<source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<header>Music</header>

<div class="controls">
<input id="trackUrl" placeholder="SoundCloud link">
<button id="addTrack">Add</button>
</div>

<div class="track-list" id="track-list"></div>

<script src="https://w.soundcloud.com/player/api.js"></script>

<script>

/* FIX autoplay */

const vid = document.getElementById("bgVideo")
vid.muted = true
vid.play().catch(()=>{})

/* add track */

document.getElementById("addTrack").onclick = ()=>{

const url = document.getElementById("trackUrl").value
if(!url) return

const div = document.createElement("div")
div.className="track"

div.innerHTML = `
<iframe height="120"></iframe>
<input type="range" min="0" max="100" value="50" class="volume">
`

document.getElementById("track-list").prepend(div)

const iframe = div.querySelector("iframe")
const slider = div.querySelector(".volume")

iframe.src = `https://w.soundcloud.com/player/?url=${encodeURIComponent(url)}`

const widget = SC.Widget(iframe)

widget.bind(SC.Widget.Events.READY, ()=>{
widget.setVolume(50)
})

slider.oninput = ()=>{
widget.setVolume(slider.value)
}

document.getElementById("trackUrl").value=""

}

</script>

</body>
</html>
