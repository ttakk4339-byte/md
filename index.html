<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini 3D Test</title>
<style>
body{margin:0; overflow:hidden; background:#87CEEB;}
canvas{display:block;}
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/three@0.156.0/build/three.min.js"></script>
<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,5,10);
camera.lookAt(0,0,0);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,20,10);
scene.add(light);

// простые кубы как блоки
const blockSize = 1;
const world = [];

for(let x=-5;x<=5;x++){
  for(let z=-5;z<=5;z++){
    const geometry = new THREE.BoxGeometry(blockSize, blockSize, blockSize);
    const material = new THREE.MeshLambertMaterial({color:0x00FF00});
    const cube = new THREE.Mesh(geometry, material);
    cube.position.set(x,0,z);
    scene.add(cube);
    world.push(cube);
  }
}

// простой игрок как красный куб
const playerGeo = new THREE.BoxGeometry(0.5,1,0.5);
const playerMat = new THREE.MeshLambertMaterial({color:0xFF0000});
const player = new THREE.Mesh(playerGeo,playerMat);
player.position.set(0,1,0);
scene.add(player);

// управление WASD
const move = {forward:false,back:false,left:false,right:false};
document.addEventListener('keydown',e=>{
  if(e.key=='w') move.forward=true;
  if(e.key=='s') move.back=true;
  if(e.key=='a') move.left=true;
  if(e.key=='d') move.right=true;
});
document.addEventListener('keyup',e=>{
  if(e.key=='w') move.forward=false;
  if(e.key=='s') move.back=false;
  if(e.key=='a') move.left=false;
  if(e.key=='d') move.right=false;
});

function animate(){
  requestAnimationFrame(animate);

  if(move.forward) player.position.z-=0.1;
  if(move.back) player.position.z+=0.1;
  if(move.left) player.position.x-=0.1;
  if(move.right) player.position.x+=0.1;

  camera.position.x = player.position.x;
  camera.position.z = player.position.z + 10;
  camera.position.y = player.position.y + 5;
  camera.lookAt(player.position);

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
