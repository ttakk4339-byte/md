<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MyPurpleSpotify</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
<style>
/* --- Базовые стили --- */
body{
    margin:0;
    font-family:'Montserrat', sans-serif;
    background:#0c0c1f;
    color:white;
    overflow-x:hidden;
    position:relative;
}

/* --- Динамический фоновый градиент --- */
@keyframes bgGradient {
  0%{background: linear-gradient(135deg, #6a0dad, #4b0082);}
  25%{background: linear-gradient(135deg, #7b1fa2, #5e35b1);}
  50%{background: linear-gradient(135deg, #8e24aa, #7b1fa2);}
  75%{background: linear-gradient(135deg, #6a0dad, #4b0082);}
  100%{background: linear-gradient(135deg, #7b1fa2, #5e35b1);}
}
body{
    animation:bgGradient 20s ease infinite;
}

/* --- Снег --- */
.snowflake{
    position:fixed;
    top:-10px;
    z-index:0;
    user-select:none;
    pointer-events:none;
    color:white;
    font-size:1em;
    opacity:0.8;
    animation-name:fall;
    animation-timing-function:linear;
    animation-iteration-count:infinite;
}

@keyframes fall{
    0%{transform:translateY(0px);}
    100%{transform:translateY(100vh);}
}

/* --- Header --- */
header{
    padding:20px;
    text-align:center;
    background:rgba(128,0,128,0.5);
    font-size:28px;
    font-weight:700;
    letter-spacing:2px;
    backdrop-filter:blur(15px);
    border-bottom:1px solid rgba(255,255,255,0.2);
}

/* --- Список треков --- */
.track-list{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
    padding:20px;
    z-index:1;
    position:relative;
}

/* --- Карточка трека с animated glassmorphism --- */
.track{
    background: linear-gradient(135deg, rgba(128,0,128,0.3), rgba(75,0,130,0.3));
    border-radius:15px;
    padding:15px;
    transition: transform 0.3s, box-shadow 0.3s;
    backdrop-filter: blur(15px) saturate(180%);
    border:1px solid rgba(255,255,255,0.2);
    animation: glassShift 6s ease-in-out infinite alternate;
}
@keyframes glassShift {
    0%{background: linear-gradient(135deg, rgba(128,0,128,0.3), rgba(75,0,130,0.3));}
    50%{background: linear-gradient(135deg, rgba(138,43,226,0.4), rgba(148,0,211,0.4));}
    100%{background: linear-gradient(135deg, rgba(128,0,128,0.3), rgba(75,0,130,0.3));}
}
.track:hover{
    transform: scale(1.05);
    box-shadow: 0 0 25px rgba(186,85,211,0.6);
}

.track h3{
    margin:10px 0;
}

/* --- Слайдер громкости --- */
.volume-control{
    width:100%;
    margin-top:10px;
}

/* --- iframe плеер --- */
iframe{
    border-radius:10px;
    border:none;
}

/* --- Адаптив --- */
@media(max-width:400px){
    .track-list{
        grid-template-columns:1fr;
    }
}
</style>
</head>
<body>

<header>💜 MyPurpleSpotify</header>

<div class="track-list" id="track-list"></div>

<script src="https://w.soundcloud.com/player/api.js"></script>

<script>
// --- Массив треков SoundCloud ---
const tracks = [
  { title: "E-Bannaya", url: "https://soundcloud.com/morgenshternfamilyoneluv/morgenshtern-e-bannaya" },
  { title: "Track Two", url: "https://soundcloud.com/anotherartist/song2" }
];

const container = document.getElementById("track-list");

tracks.forEach(track => {
  const div = document.createElement("div");
  div.className = "track";
  div.innerHTML = `
    <h3>${track.title}</h3>
    <iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay"></iframe>
    <input type="range" min="0" max="100" value="100" class="volume-control">
  `;
  container.appendChild(div);
  
  const iframe = div.querySelector('iframe');
  const slider = div.querySelector('.volume-control');
  
  iframe.src = `https://w.soundcloud.com/player/?url=${encodeURIComponent(track.url)}&color=%23ba55d3&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false`;
  
  const widget = SC.Widget(iframe);
  
  slider.addEventListener('input', () => {
    widget.setVolume(parseInt(slider.value));
  });
});

// --- Эффект снега ---
function createSnow(){
  const snowCount = 50;
  for(let i=0;i<snowCount;i++){
    const snow = document.createElement('div');
    snow.className='snowflake';
    snow.style.left=Math.random()*window.innerWidth+'px';
    snow.style.fontSize=(10+Math.random()*20)+'px';
    snow.style.animationDuration=(5+Math.random()*10)+'s';
    snow.style.opacity=Math.random();
    snow.innerHTML='❄';
    document.body.appendChild(snow);
  }
}
createSnow();
</script>

</body>
</html>
