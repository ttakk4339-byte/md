<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini 3D Walking</title>
<style>
body{margin:0; overflow:hidden;}
canvas{display:block;}
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/three@0.156.0/build/three.min.js"></script>
<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,20,10);
scene.add(light);

// мир из блоков (земля)
const blockSize = 1;
const world = [];
for(let x=-5;x<=5;x++){
  for(let z=-5;z<=5;z++){
    const geometry = new THREE.BoxGeometry(blockSize, blockSize, blockSize);
    const material = new THREE.MeshLambertMaterial({color:0x00FF00});
    const cube = new THREE.Mesh(geometry, material);
    cube.position.set(x,0,z);
    scene.add(cube);
    world.push(cube);
  }
}

// игрок (красный куб)
const playerGeo = new THREE.BoxGeometry(0.5,1,0.5);
const playerMat = new THREE.MeshLambertMaterial({color:0xFF0000});
const player = new THREE.Mesh(playerGeo,playerMat);
player.position.set(0,1,0);
scene.add(player);

// физика игрока
let velocityY = 0;
const gravity = 0.02;
let grounded = false;

// управление WASD
const keys = {w:false,s:false,a:false,d:false};
document.addEventListener('keydown',e=>{
  if(e.key=='w') keys.w=true;
  if(e.key=='s') keys.s=true;
  if(e.key=='a') keys.a=true;
  if(e.key=='d') keys.d=true;
  if(e.key==' ' && grounded) {velocityY=0.35; grounded=false;} // прыжок
});
document.addEventListener('keyup',e=>{
  if(e.key=='w') keys.w=false;
  if(e.key=='s') keys.s=false;
  if(e.key=='a') keys.a=false;
  if(e.key=='d') keys.d=false;
});

function animate(){
  requestAnimationFrame(animate);

  // движение
  let speed = 0.1;
  if(keys.w) player.position.z -= speed;
  if(keys.s) player.position.z += speed;
  if(keys.a) player.position.x -= speed;
  if(keys.d) player.position.x += speed;

  // гравитация
  velocityY -= gravity;
  player.position.y += velocityY;

  // столкновение с землёй
  if(player.position.y < 1){ // куб земли y=0, игрок 1 высота
    player.position.y = 1;
    velocityY=0;
    grounded=true;
  }

  // камера следит за игроком
  camera.position.x = player.position.x;
  camera.position.z = player.position.z + 5;
  camera.position.y = player.position.y + 3;
  camera.lookAt(player.position);

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
