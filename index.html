<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MyPurpleSpotify Deluxe Glow</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
<style>
body{
    margin:0;
    font-family:'Montserrat', sans-serif;
    background:#0c0c1f;
    color:white;
    overflow-x:hidden;
    position:relative;
    animation:bgGradient 25s ease infinite;
}
@keyframes bgGradient {
  0%{background: linear-gradient(135deg, #4b0082, #6a0dad);}
  25%{background: linear-gradient(135deg, #5e35b1, #7b1fa2);}
  50%{background: linear-gradient(135deg, #7b1fa2, #8e24aa);}
  75%{background: linear-gradient(135deg, #6a0dad, #4b0082);}
  100%{background: linear-gradient(135deg, #7b1fa2, #5e35b1);}
}
.snowflake{position:fixed;top:-10px;z-index:0;user-select:none;pointer-events:none;color:white;font-size:1em;opacity:0.8;animation-name:fall;animation-timing-function:linear;animation-iteration-count:infinite;}
@keyframes fall{0%{transform:translateY(0px);}100%{transform:translateY(100vh);}}
header{padding:20px;text-align:center;background:rgba(138,43,226,0.6);font-size:28px;font-weight:700;letter-spacing:2px;backdrop-filter:blur(15px);border-bottom:1px solid rgba(255,255,255,0.2);}
#searchContainer{display:flex;justify-content:center;gap:10px;margin:20px;background: rgba(138,43,226,0.3);backdrop-filter: blur(15px) saturate(180%);border-radius:12px;padding:10px;border:1px solid rgba(255,255,255,0.2);}
#searchContainer input{width:300px;padding:8px;border-radius:8px;border:none;outline:none;font-size:16px;background: rgba(255,255,255,0.05);color:white;}
#searchContainer input::placeholder{color: rgba(255,255,255,0.6);}
#searchContainer button{padding:8px 16px;border:none;border-radius:8px;background: rgba(186,85,211,0.6);color:white;font-weight:700;cursor:pointer;transition: transform 0.2s, background 0.3s;}
#searchContainer button:hover{transform: scale(1.05);background: rgba(186,85,211,0.8);}
.track-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;padding:20px;z-index:1;position:relative;}
.track{background: linear-gradient(135deg, rgba(138,43,226,0.3), rgba(75,0,130,0.3));border-radius:20px;padding:20px;transition: transform 0.3s, box-shadow 0.3s;backdrop-filter: blur(15px) saturate(200%);border:1px solid rgba(255,255,255,0.2);animation: glassShift 6s ease-in-out infinite alternate;position: relative;}
@keyframes glassShift{0%{background: linear-gradient(135deg, rgba(138,43,226,0.3), rgba(75,0,130,0.3));}50%{background: linear-gradient(135deg, rgba(186,85,211,0.4), rgba(148,0,211,0.4));}100%{background: linear-gradient(135deg, rgba(138,43,226,0.3), rgba(75,0,130,0.3));}}
.track::before{content:'';position:absolute;top:-5px;left:-5px;right:-5px;bottom:-5px;border-radius:20px;background: rgba(186,85,211,0.4);filter: blur(20px);opacity:0;transition: opacity 0.3s;z-index:-1;}
.track:hover::before{opacity:1;animation: pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:0.6; transform: scale(1);}50%{opacity:1; transform: scale(1.05);}}
.track h3{margin:10px 0;}
.volume-control{width:100%;margin-top:10px;}
iframe{border-radius:12px;border:none;}
.track a.download{display:inline-block;margin-top:8px;background: rgba(186,85,211,0.6);padding:6px 12px;border-radius:8px;color:white;font-weight:700;text-decoration:none;transition: background 0.3s;}
.track a.download:hover{background: rgba(186,85,211,0.9);}
@media(max-width:400px){.track-list{grid-template-columns:1fr;}}
</style>
</head>
<body>
<header>💜 MyPurpleSpotify Deluxe Glow</header>
<div id="searchContainer">
    <input type="text" id="trackUrl" placeholder="Вставь ссылку на SoundCloud трек">
    <button id="addTrack">Добавить трек</button>
</div>
<div class="track-list" id="track-list"></div>
<script src="https://w.soundcloud.com/player/api.js"></script>
<script>
document.getElementById('addTrack').addEventListener('click', ()=>{
  const url = document.getElementById('trackUrl').value;
  if(!url) return;
  const container = document.getElementById('track-list');
  const div = document.createElement('div');
  div.className = "track";
  div.innerHTML = `
    <h3>Новый трек</h3>
    <iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay"></iframe>
    <input type="range" min="0" max="100" value="5" class="volume-control">
    <a href="${url}" target="_blank">Слушать на SoundCloud</a>
    <button class="download">Скачать</button>
  `;
  container.prepend(div);
  const iframe = div.querySelector('iframe');
  const slider = div.querySelector('.volume-control');
  iframe.src = `https://w.soundcloud.com/player/?url=${encodeURIComponent(url)}&color=%23ba55d3&auto_play=false`;
  const widget = SC.Widget(iframe);
  widget.bind(SC.Widget.Events.READY, function() {
      widget.setVolume(5);
      slider.value = 5;
  });
  slider.addEventListener('input',()=>{widget.setVolume(parseInt(slider.value));});

  // Кнопка скачать через fetch + blob
  const btn = div.querySelector('.download');
  btn.addEventListener('click', async ()=>{
      try{
          const res = await fetch(url);
          const blob = await res.blob();
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = "track.mp3";
          a.click();
          URL.revokeObjectURL(a.href);
      }catch(e){
          alert("Не удалось скачать. Возможно, трек запрещён для скачивания.");
      }
  });

  document.getElementById('trackUrl').value='';
});

// Snow
function createSnow(){
  const snowCount = 50;
  for(let i=0;i<snowCount;i++){
    const snow = document.createElement('div');
    snow.className='snowflake';
    snow.style.left=Math.random()*window.innerWidth+'px';
    snow.style.fontSize=(10+Math.random()*20)+'px';
    snow.style.animationDuration=(5+Math.random()*10)+'s';
    snow.style.opacity=Math.random();
    snow.innerHTML='❄';
    document.body.appendChild(snow);
  }
}
createSnow();
</script>
</body>
</html>
